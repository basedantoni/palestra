name: Whoop Token Refresh

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Whoop tokens
        run: |
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_API_SECRET }}" \
            "${{ secrets.SERVER_BASE_URL }}/api/internal/whoop/refresh-tokens")
          echo "HTTP $status: $(cat /tmp/response.json)"
          [ "$status" = "200" ] || exit 1
