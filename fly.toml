# fly.toml app configuration file generated for palestra on 2026-03-05T12:55:44-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'palestra'
primary_region = 'dfw'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[deploy]
  release_command = "sh -c 'cd /app && pnpm -F @src/db db:migrate && pnpm -F @src/db db:seed'"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
