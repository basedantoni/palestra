name: life-tracker

services:
  postgres:
    image: postgres
    container_name: life-tracker-postgres
    environment:
      POSTGRES_DB: life-tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - src_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  src_postgres_data:
